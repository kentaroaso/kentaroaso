<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>kentaroaso</title>
    <link rel="stylesheet" href="stylesheet.css">
    <link rel="stylesheet" href="//maxcdn.bootstrapcdn.com/font-awesome/4.3.0/css/font-awesome.min.css">
  </head>
  <body>
    <header>
      <div class="container">
        <div class="header-left">
          <img class="logo" src="https://kentaroaso.github.io/kentaroaso/IMG_1237.jpeg">
        </div>
        <div class="header-right">
          <a href="#" class="login">会員の入口</a>
        </div>
      </div>
    </header>
    <div class="top-wrapper">
      <div class="container">
        <h1>あそうけんたろう<br>人生の日記</h1>
        <p>大切な思い出、日々の教訓をアップしています。<br>豊かな人生を送って幸せになりましょう。</p>
        <div class="btn-wrapper">
          <a href="#" class="btn signup">イシュー研究はこちら</a>
          <p>or</p>
          <a href="#" class="btn facebook"><span class="facebook"></span>幸せ画像はこちら</a>
          <a href="#" class="btn twitter"><span class="twitter"></span>日々の教訓はこちら</a>
        </div>
      </div>
    </div>
    <div class="lesson-wrapper">
      <div class="container">
        <div class="heading">
          <h2>さあ、宝箱を明けましょう！</h2>
        </div>
        <div class="lessons">
          <div class="lesson">
            <div class="lesson-icon">
              <img src="https://kentaroaso.github.io/kentaroaso/B9B5D6C1-DCCE-4CEA-8811-52418D3A2460_1_105_c.jpeg">
              <p>イシュー</p>
            </div>
            <p class="txt-contents">やるべきことは全体の３％です。</p>
          </div>
          <div class="lesson">
            <div class="lesson-icon">
              <img src="https://kentaroaso.github.io/kentaroaso/IMG_1027.jpeg">
              <p>仮説</p>
            </div>
            <p class="txt-contents">いわゆる直感です。</p>
          </div>
          <div class="lesson">
            <div class="lesson-icon">
              <img src="https://kentaroaso.github.io/kentaroaso/IMG_1988.jpeg">
              <p>課題の分離</p>
            </div>
            <p class="txt-contents">他人の顔色を気にするのはやめましょう。</p>
          </div>
          <div class="lesson">
            <div class="lesson-icon">
              <img src="https://kentaroaso.github.io/kentaroaso/cache_Messagep4236.jpeg">
              <p>クリティカルシンキング</p>
            </div>
            <p class="txt-contents">それ、本当に正しいですか？</p>
          </div>
        </div>
      </div>
    </div>
    <div class="message-wrapper">
      <div class="container">
        <div class="heading">
          <h2>さぁ、あなたも自分の人生を歩んでみませんか?</h2>
          <h3>一歩踏み出す勇気を!</h3>
        </div>
        <span class="btn message">さっそく行動する。</span>
      </div>
    </div>
    <footer>
      <div class="container">
        <img src="https://kentaroaso.github.io/kentaroaso/B9B5D6C1-DCCE-4CEA-8811-52418D3A2460_1_105_c.jpeg">
        <p>今という時間は戻ってきません。</p>
      </div>
    </footer>
  </body>
</html>
