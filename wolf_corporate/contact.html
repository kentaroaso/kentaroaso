<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="google-site-verification" content="YjCfhsKCAannrojGnKeqNKdzT4NU6ZM3___8cfVpP7w" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>K-1ジムウルフ｜栃木県初のK-1認定ジム</title>
    <link rel="shortcut icon" type="image/x-icon"
        href="https://kentaroaso.github.io/kentaroaso/wolf_corporate/images/wolf.jpg">
    <meta name="keywords" content="キックボクシング,ムエタイ,ジム,栃木,宇都宮,">
    <meta name="description"
        content="練習が厳しいジム。というよりも個性や個人個人に合わせた自由でのびのびとK-1を楽しめるジムを目指しています。もちろん、本格的に選手やプロを目指す方も、本場ムエタイのチャンピオン・シットトレーナーをはじめ、経験豊富なトレーナがおりますので育成カリキュラムも万全です。">
    <link rel="canonical" href="https://kentaroaso.github.io/kentaroaso/">
    <link rel="stylesheet" href="css/style.css" type="text/css" media="screen">
    <link rel="stylesheet" href="css/meanmenu.css" />
    <script src="https://code.jquery.com/jquery-1.9.1.js"></script>
    <script src="js/jquery.meanmenu.js"></script>
    <script>
        $(document).ready(function () {
            $('nav').meanmenu({
                meanScreenWidth: "960", // 表示させるウィンドウサイズ(ブレイクポイント)
            });
        });
    </script>
</head>

<body>

    <!--ヘッダーここから-->
    <header>
        <h1>
            <img src="images/logo.png" alt="K-1ジムウルフ">
        </h1>

        <nav>
            <ul>
                <li><a href="index.html">ホームへ戻る</a></li>
                <li><a href="greeting.html">会長あいさつ</a></li>
                <li><a href="lesson.html">レッスンのご案内</a></li>
                <li><a href="question.html">よくあるご質問</a></li>
                <li><a href="access.html">アクセス</a></li>
            </ul>
        </nav>

        <div class="clear"></div>

        <p id="nav_tel">栃木県初のK-1ジム</p>

    </header>
    <!--ヘッダーここまで-->
    <!--中見だしここから-->
    <h2 id="heading" class="box-shadow">
        お問い合わせ
    </h2>
    <!--中見だしここまで-->
    <!--コンテナーここから-->
    <div id="container">
        <!--レフトここから-->
        <div id="left" class="box-shadow">
            <h3>お問い合わせフォーム</h3>
            <p id="contact_text">
                下記お問い合わせフォームよりご希望の日時、ご予約内容をお知らせください。<br>
                お問い合わせの場合は、【お客様ご要望欄】に記入して返信してください。
            </p>
            <form>
                <fieldset>
                    <label class="form_title" for="form_name">お名前</label>
                    <input class="form_contents" type="text" name="お名前" id="form_name" placeholder="氏名">
                    <label class="form_title" for="form_tel">お電話番号</label>
                    <input class="form_contents" type="text" name="お電話番号" id="form_tel" placeholder="電話番号またはメールアドレス">

                    <label class="form_title" for="form_time">ご希望日時</label>

                    <br>

                    <input type="text" class="form_time form_contents">年
                    <input type="text" class="form_time form_contents">月
                    <input type="text" class="form_time form_contents">日

                    <br>

                    <input type="text" class="form_time form_contents">時から
                    <input type="text" class="form_time form_contents">時まで

                    <br>

                    <label class="form_title">ご希望メニュー</label>

                    <br>

                    <input type="checkbox" id="menu_look" value="見学">
                    <label for="menu_look" class="form_title">見学</label>

                    <input type="checkbox" id="menu-lesson" value="体験">
                    <label for="menu-lesson" class="form_title">体験</label>

                    <input type="checkbox" id="menu_join" value="ご入会">
                    <label for="menu_join" class="form_title">ご入会</label>

                    <br>

                    <label for="form_textarea" class="form_title">お客様ご要望欄</label>
                    <textarea name="お客様ご要望欄" id="form_textarea" class="form_contents" cols="30" rows="10"
                        placeholder="ご不明な点はお気軽にどうぞ"></textarea>
                </fieldset>

                <p id="submit">
                    <input type="submit" value="送信する">
                </p>

            </form>
        </div>
        <!--レフトここまで-->

        <!--ライトここから-->
        <div id="right">
            <ul>
                <li class="box-shadow"><a id="tel_contact" href="#">いますぐ相談する</a></li>
                <li class="box-shadow"><a id="mail_contact" href="#">無料体験に申し込む</a></li>
                <li class="box-shadow"><a id="facebook" href="#">友達リクエスト</a></li>
            </ul>
        </div>
        <!--ライトここまで-->

        <div class="clear"></div>

    </div>
    <!--コンテナーここまで-->
    <!--フッターここから-->
    <footer>
        <p>WEBサイト制作｜大切な人に大切なことを</p>
    </footer>
    <!--フッターここまで-->
</body>

</html>
